<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vitamin S — Warm introductions that open doors. For super communicators and job seekers.">
  <title>Vitamin S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="splash">

  <!-- ─── NAV ─── -->
  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a href="/" class="nav__logo" aria-label="Vitamin S">
        Vitamin&nbsp;<span class="nav__s">S</span>
      </a>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language" data-i18n="langToggle">EN</button>
    </div>
  </header>

  <main class="splash-main">
    <div class="splash-hero">
      <p class="splash-tagline" data-i18n="splashTagline">Vitamin B war gestern.</p>
    </div>

    <div class="splash-cards container">

      <a href="/communicators.html" class="splash-card splash-card--communicator">
        <div class="splash-card__stripe splash-card__stripe--communicator"></div>
        <div class="splash-card__body">
          <div class="splash-card__icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="9" r="5" stroke="currentColor" stroke-width="2.5"/>
              <circle cx="9" cy="36" r="5" stroke="currentColor" stroke-width="2.5"/>
              <circle cx="39" cy="36" r="5" stroke="currentColor" stroke-width="2.5"/>
              <line x1="21.5" y1="13.5" x2="11.5" y2="31.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="26.5" y1="13.5" x2="36.5" y2="31.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="14" y1="36" x2="34" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h2 data-i18n="splashCommTitle">Ich bin Türöffner</h2>
          <p data-i18n="splashCommSub">Du kennst die richtigen Leute? Verdiene Geld mit deinem Netzwerk.</p>
          <span class="splash-card__cta splash-card__cta--communicator" data-i18n="splashCTA">Mehr erfahren →</span>
        </div>
      </a>

      <a href="/seekers.html" class="splash-card splash-card--seeker">
        <div class="splash-card__stripe splash-card__stripe--seeker"></div>
        <div class="splash-card__body">
          <div class="splash-card__icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="11" stroke="currentColor" stroke-width="2.5"/>
              <path d="M29 29l9 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M16 20h8M20 16v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h2 data-i18n="splashSeekerTitle">Ich suche Zugang</h2>
          <p data-i18n="splashSeekerSub">Du brauchst eine warme Intro? Finde die richtige Verbindung.</p>
          <span class="splash-card__cta splash-card__cta--seeker" data-i18n="splashCTA">Mehr erfahren →</span>
        </div>
      </a>

    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer class="footer footer--minimal">
    <div class="container footer__inner">
      <div class="footer__bottom">
        <a href="mailto:hello@vitamin-s.com" class="footer__email">hello@vitamin-s.com</a>
        <span class="footer__copy" data-i18n="footerCopyright">© 2026 Vitamin S</span>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>

</html>
